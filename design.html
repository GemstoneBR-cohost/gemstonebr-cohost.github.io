<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design & Renovation | GemstoneBR Co-Host</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #9FB49E;
            --text-dark: #333333;
            --text-light: #F5F1E9;
            --bg-light: #FFFFFF;
            --btn-bg: #F5F1E9;
            --btn-text: #333333;
        }
        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }
        nav {
            background: var(--bg-light);
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-img {
            height: 100px;
            width: auto;
            object-fit: contain;
        }
        .logo-text {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .nav-links {
            display: flex;
            gap: 35px;
        }
        .nav-links a {
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 500;
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .page-container {
            max-width: 1400px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }
        .page-title {
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 48px;
            color: var(--text-dark);
            margin-bottom: 15px;
        }
        .page-subtitle {
            font-size: 20px;
            color: #666;
            margin-bottom: 40px;
        }
        /* 🔥 强化图片样式，确保显示 */
        .banner-image {
            width: 100%;
            height: auto;
            border-radius: 0;
            object-fit: cover;
            display: block; /* 强制显示 */
            margin: 0 auto; /* 居中 */
            max-width: 100%; /* 适配手机 */
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo-wrapper">
                <img src="https://raw.githubusercontent.com/Ula1996/ula1996.github.io/main/%E7%99%BD%E5%BA%95logo.png" class="logo-img" alt="GemstoneBR Co-Host">
                <span class="logo-text">GemstoneBR Co-Host</span>
            </div>
            <div class="nav-links">
                <a href="index.html">SERVICES</a>
                <a href="index.html#contact">CONTACT</a>
            </div>
        </div>
    </nav>

    <div class="page-container">
        <h1 class="page-title">Design & Renovation</h1>
        <p class="page-subtitle">Transform Your Space</p>
        <!-- 🔥 先测试这个通用链接，能显示后再换你自己的 -->
        <img src="https://picsum.photos/1440/600" alt="Design & Renovation" class="banner-image">
        <!-- 替换示例：把上面的src换成你自己的图片直链
        <img src="https://raw.githubusercontent.com/Ula1996/ula1996.github.io/main/why-choose-us.png" alt="Design & Renovation" class="banner-image">
        -->
    </div>

</body>
</html>
